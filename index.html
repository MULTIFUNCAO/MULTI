<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi - Guarulhos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg">
        <div class="p-6 bg-blue-600 text-white text-center rounded-b-3xl">
            <h1 class="text-2xl font-bold italic">Multi</h1>
            <p class="text-sm opacity-90">Serviços em um toque</p>
        </div>

        <div class="p-4 space-y-4">
            <div class="bg-blue-600 p-6 rounded-2xl text-white text-center">
                <h2 class="text-xl font-bold">Sua casa em boas mãos, num toque.</h2>
                <button class="mt-4 bg-white text-blue-600 px-6 py-2 rounded-full font-bold"> + Novo Pedido</button>
            </div>

            <h3 class="font-bold text-gray-700">Categorias</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 border rounded-xl text-center">🔨 Montagem</div>
                <div class="p-4 border rounded-xl text-center">⚡ Elétrica</div>
                <div class="p-4 border rounded-xl text-center">🧹 Limpeza</div>
                <div class="p-4 border rounded-xl text-center">🛠️ Reparos</div>
            </div>
        </div>

        <div class="fixed bottom-0 max-w-md w-full bg-white border-t p-4 flex justify-around text-blue-600 font-bold">
            <span>Início</span>
            <span>Mensagens</span>
            <span class="text-orange-500">PRO</span>
        </div>
    </div>
</body>
</html>
